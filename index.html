.color-switcher {
position: fixed;
top: 0; right: 0; bottom: 0;
width: 210px;
background: rgba(0,0,0,0.6);
backdrop-filter: blur(10px);
display: flex;
flex-direction: column;
padding: 12px 10px;
gap: 4px;
overflow-y: auto;
z-index: 100;
}
.color-switcher .panel-title {
color: rgba(255,255,255,0.6);
font-size: 11px;
text-align: center;
letter-spacing: 0.1em;
margin-bottom: 4px;
}
.color-switcher .section-label {
color: rgba(255,255,255,0.45);
font-size: 10px;
letter-spacing: 0.06em;
margin-top: 8px;
margin-bottom: 1px;
padding-left: 6px;
border-left: 2px solid rgba(255,255,255,0.25);
}
.color-switcher button {
padding: 6px 10px;
border: 2px solid transparent;
border-radius: 6px;
cursor: pointer;
font-size: 12px;
font-family: inherit;
font-weight: 600;
text-shadow: 0 1px 3px rgba(0,0,0,0.45);
text-align: left;
transition: border-color 0.2s, transform 0.1s;
color: white;
}
.color-switcher button.light-text { color: #333; text-shadow: none; }
.color-switcher button:hover { border-color: rgba(255,255,255,0.6); transform: translateX(-2px); }
.color-switcher button.active { border-color: white; box-shadow: inset 0 0 0 1px white; }

.header {
display: flex;
justify-content: space-between;
align-items: center;

.time { font-size: 2.2rem; font-weight: 700; }
.date { font-size: 1rem; opacity: 0.75; margin-top: 2px; }

.content {

padding: 60px 225px 40px 60px;

}
.meeting-title { font-size: 3.2rem; font-weight: 700; color: #FFD966; margin-bottom: 20px; }

.attendees { display: flex; align-items: center; gap: 10px; font-size: 1.5rem; }

.search-icon { position: fixed; bottom: 20px; left: 20px; opacity: 0.6; }
.search-icon svg { width: 32px; height: 32px; fill: white; }
</style>

  </div>

<script>
  let current = null;

  function pick(btn, color) {
    document.body.style.background = color;
    if (current) current.classList.remove('active');
    btn.classList.add('active');
    current = btn;
  }

  function updateTime() {
    const now = new Date();
    let h = now.getHours();
    const m = String(now.getMinutes()).padStart(2,'0');
    const ampm = h >= 12 ? '下午' : '上午';
    if (h > 12) h -= 12;
    if (h === 0) h = 12;
    const days = ['週日','週一','週二','週三','週四','週五','週六'];
    document.querySelector('.time').textContent = `${ampm} ${String(h).padStart(2,'0')}:${m}`;
    document.querySelector('.date').textContent = `${days[now.getDay()]}. ${now.getMonth()+1}月 ${now.getDate()}, ${now.getFullYear()}`;
  }
  updateTime();
  setInterval(updateTime, 1000);

  pick(document.getElementById('default-btn'), '#AA5C5C');
</script>
